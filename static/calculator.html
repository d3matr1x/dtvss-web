<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DTVSS Calculator - Interactive Vulnerability Scoring with Optional Embodiments</title>
<meta name="description" content="Interactive DTVSS calculator with manual input, CVE auto-lookup, environment-adjusted exploitability, temporal decay, and fleet-level organisational risk scaling. Patent pending.">
<meta name="keywords" content="DTVSS calculator, vulnerability scoring, medical device cybersecurity, CVSS exploitability, EPSS, patient harm, ORS fleet scaling, ZTA, temporal decay">
<meta name="author" content="Andrew Broglio">
<meta name="robots" content="index, follow">
<link rel="canonical" href="https://dtvss.io/calculator">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600;700&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
<!-- Cloudflare Turnstile (managed mode) for /api/lookup bot challenge.
     Loaded async; the page renders fine without it (the API call will
     surface a "Bot challenge required" error if the script failed to
     load). Sitekey is injected at request time by the server via the
     data-attribute on the placeholder div below. -->
<script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #080a0f; }
  input[type=range] { -webkit-appearance: none; appearance: none; background: transparent; }
  input[type=range]::-webkit-slider-track { height: 3px; background: #1e2433; border-radius: 2px; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #b8bcc8; margin-top: -4px; cursor: pointer; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes slideIn { from { opacity: 0; transform: translateX(-8px); } to { opacity: 1; transform: translateX(0); } }
</style>
</head>
<body>
<div id="root">
  <div style="padding:40px;font-family:system-ui;color:#b8bcc8;text-align:center;background:#080a0f">
    <div style="font-size:14px;color:#6b7280">Loading calculator...</div>
    <div id="errMsg" style="font-size:11px;color:#e05252;margin-top:8px;font-family:monospace;white-space:pre-wrap"></div>
    <div style="font-size:11px;color:#6b7280;margin-top:8px">If this message persists, try the <a href="/" style="color:#5b93f5">search interface</a> instead.</div>
  </div>
</div>
<script>
window.addEventListener('error', function(e) {
  var em = document.getElementById('errMsg');
  if (em) em.textContent = 'Error: ' + (e.message || 'Unknown') + (e.filename ? ' in ' + e.filename : '');
});

(function() {
  'use strict';

  const e = React.createElement;
  const { useState, useEffect, useRef } = React;

  const K = 15;

  const TGA_CLASSES = {
    IIb: {
      H: 7.5, label: "Class IIb", desc: "Moderate-high risk - Network-connected therapeutic devices",
      color: "#e08a3a",
      examples: "Infusion pumps, insulin pumps, ventilators, patient monitors, CGMs",
      jurisdictions: {
        "TGA / Medsafe (AU / NZ)": "Class IIb",
        "MDR (EU)": "Class IIb",
        "MHRA (UK)": "Class IIb",
        "FDA (US)": "Class II"
      }
    },
    III: {
      H: 10.0, label: "Class III", desc: "Highest risk - Implantable life-sustaining devices",
      color: "#e05252",
      examples: "Pacemakers, implantable defibrillators, CRT devices",
      jurisdictions: {
        "TGA / Medsafe (AU / NZ)": "Class III",
        "MDR (EU)": "Class III",
        "MHRA (UK)": "Class III",
        "FDA (US)": "Class III"
      }
    }
  };

  const THRESHOLDS = [
    { max: 3.0,  level: "Low",      color: "#48b878", bg: "rgba(76,175,122,0.08)",  border: "rgba(76,175,122,0.25)",  sla: "Monitor",
      guidance: "No immediate remediation required. Maintain routine patch cycle and continuous monitoring.",
      rationale: "Represents minimal exploitability or impact. Managed under standard vulnerability management." },
    { max: 6.0,  level: "Medium",   color: "#d4b832", bg: "rgba(201,180,40,0.08)",  border: "rgba(201,180,40,0.25)",  sla: "≤ 30 days",
      guidance: "Remediate within defined maintenance window. Prioritise based on asset criticality.",
      rationale: "Requires timely remediation per NIST risk-based prioritisation and FDA postmarket expectations." },
    { max: 8.0,  level: "High",     color: "#e08a3a", bg: "rgba(217,124,42,0.08)",  border: "rgba(217,124,42,0.25)",  sla: "≤ 7 days",
      guidance: "Expedite remediation. Escalate to clinical/biomedical engineering and risk management teams.",
      rationale: "Indicates credible exploitation risk with potential clinical impact." },
    { max: 10.1, level: "Critical", color: "#e05252", bg: "rgba(217,79,79,0.08)",   border: "rgba(217,79,79,0.25)",   sla: "Immediate",
      guidance: "Initiate incident response immediately. Isolate or remove affected systems.",
      rationale: "Represents active exploitation or severe patient safety risk. k=15 calibration criterion satisfied." },
  ];

  function getTier(s) {
    for (const t of THRESHOLDS) if (s < t.max) return t;
    return THRESHOLDS[3];
  }

  function computeDTVSS(B, L, H, kev) {
    if (kev) return { score: 10, raw: null, tier: THRESHOLDS[3], kevOverride: true };
    const raw = (B / 10) * (H / 10) * (1 + K * L) * 10;
    const score = Math.round(Math.min(raw, 10) * 100) / 100;
    return { score, raw: Math.round(raw * 10000) / 10000, tier: getTier(score), kevOverride: false };
  }

  function App() {
    // Tier gating - Tier 1 (this page) shows optional embodiments in a
    // locked/disabled state as an upsell. Flip to false to unlock all
    // features in a paid Tier 2+ build.
    const TIER2_LOCKED = true;
    
    const [B, setB] = useState(0);
    const [L, setL] = useState(0);
    const [tgaClass, setTgaClass] = useState("IIb");
    const [kev, setKev] = useState(false);
    const [showFormula, setShowFormula] = useState(false);
    const [animScore, setAnimScore] = useState(0);
    const [cveId, setCveId] = useState("");
    const [showORS, setShowORS] = useState(false);
    const [showDecay, setShowDecay] = useState(false);
    const [showEnvAdj, setShowEnvAdj] = useState(false);
    const [deviceCount, setDeviceCount] = useState(100);
    const [scalingFn, setScalingFn] = useState("log");
    const [decayEnabled, setDecayEnabled] = useState(false);
    const [ztaEnabled, setZtaEnabled] = useState(false);
    const [showRationale, setShowRationale] = useState(false);
    const [copied, setCopied] = useState(false);
    const [lookupLoading, setLookupLoading] = useState(false);
    const [lookupMsg, setLookupMsg] = useState("");
    const [publishedDate, setPublishedDate] = useState("");

    // Turnstile state: token is captured from the bootstrap script via a
    // custom event. While unverified the Lookup button is disabled with
    // a "Verifying you're human..." label. The bootstrap also writes
    // window.__dtvssTurnstileToken so non-React code can read it.
    const [turnstileReady, setTurnstileReady] = useState(false);
    React.useEffect(() => {
      function onReady(ev) { setTurnstileReady(true); }
      function onUnready(ev) { setTurnstileReady(false); }
      window.addEventListener('dtvss-turnstile-ready', onReady);
      window.addEventListener('dtvss-turnstile-unready', onUnready);
      // If the bootstrap fired its event before this effect mounted (rare
      // but possible if the user hits the page with an already-warm CDN),
      // pick up the current state directly.
      if (window.__dtvssTurnstileToken) setTurnstileReady(true);
      return function () {
        window.removeEventListener('dtvss-turnstile-ready', onReady);
        window.removeEventListener('dtvss-turnstile-unready', onUnready);
      };
    }, []);

    const lookupCVE = async (id) => {
      const cve = id || cveId;
      if (!cve.match(/^CVE-\d{4}-\d+$/i)) return;
      setLookupLoading(true); setLookupMsg("");
      try {
        // Read the cached Turnstile token captured by the bootstrap when
        // its callback fired. Tokens are single-use, so after reading we
        // clear the cache and reset the widget to fetch a fresh one.
        // The widget is reset silently in the background; after the
        // user's first successful verification the widget is hidden and
        // stays that way (passing reason:'used' tells the bootstrap to
        // keep it hidden rather than fading it back in).
        let tsToken = window.__dtvssTurnstileToken || "";
        if (tsToken) {
          window.__dtvssTurnstileToken = "";
          setTurnstileReady(false);
          window.dispatchEvent(new CustomEvent('dtvss-turnstile-unready', {
            detail: { reason: 'used' }
          }));
          if (window.turnstile && window.__dtvssTurnstileWidget != null) {
            try { window.turnstile.reset(window.__dtvssTurnstileWidget); } catch (e) {}
          }
        }
        const url = `/api/lookup?cve=${encodeURIComponent(cve)}` +
                    (tsToken ? `&cf-turnstile-response=${encodeURIComponent(tsToken)}` : "");
        const resp = await fetch(url);
        const data = await resp.json();
        if (data.error) {
          setLookupMsg(data.error);
        } else {
          if (data.B !== undefined) setB(data.B);
          if (data.L !== undefined) setL(data.L);
          if (data.kev_override) setKev(true); else setKev(!!data.kev_added);
          if (data.tga_class && TGA_CLASSES[data.tga_class]) setTgaClass(data.tga_class);
          if (data.published) setPublishedDate(data.published);
          setLookupMsg(`Loaded: B=${data.B} L=${data.L} ${data.tga_class || ""} ${data.kev_override ? "KEV" : ""}`);
        }
      } catch(err) {
        setLookupMsg("API error: " + err.message);
      }
      setLookupLoading(false);
    };

    const H = TGA_CLASSES[tgaClass].H;
    const cveYear = cveId.match(/CVE-(\d{4})/i)?.[1];
    // Use full published date for precise age if available, else fall back to year only
    const cveAge = (() => {
      if (publishedDate) {
        const pub = new Date(publishedDate);
        if (!isNaN(pub)) return Math.max(0, (Date.now() - pub.getTime()) / (365.25 * 24 * 3600 * 1000));
      }
      return cveYear ? (new Date().getFullYear() - parseInt(cveYear)) : 0;
    })();
    const halfLife = tgaClass === "III" ? 13.9 : 10;
    const lambda = Math.log(2) / halfLife;
    // When TIER2_LOCKED, force L_eff=L and B_adj=B so state manipulation via
    // devtools can't activate locked Tier 2+ features.
    const L_eff = (!TIER2_LOCKED && decayEnabled && cveAge > 0) ? L * Math.exp(-lambda * cveAge) : L;
    const B_adj = (!TIER2_LOCKED && ztaEnabled) ? B * 0.571 : B;
    const result = computeDTVSS(B_adj, L_eff, H, kev);
    const tier = result.tier;
    const staticBaseline = Math.round((B_adj * H / 10) * 100) / 100;
    const baseResult = (!TIER2_LOCKED && (ztaEnabled || decayEnabled)) ? computeDTVSS(B, L, H, kev) : null;

    const computeF = (N) => {
      if (scalingFn === "log") return 1 + Math.log10(Math.max(N, 1));
      if (scalingFn === "saturating") return 1 + N / (N + 100);
      if (scalingFn === "exponential") return 1 + (1 - Math.exp(-N / 100));
      if (scalingFn === "tiered") { if (N <= 10) return 1; if (N <= 100) return 1.5; if (N <= 1000) return 2; return 3; }
      return 1;
    };
    const F_N = computeF(deviceCount);
    const ORS = Math.round(result.score * F_N * 100) / 100;

    useEffect(() => {
      const target = result.score, start = animScore, duration = 400, startTime = Date.now();
      const animate = () => {
        const elapsed = Date.now() - startTime;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        setAnimScore(start + (target - start) * eased);
        if (progress < 1) requestAnimationFrame(animate);
      };
      requestAnimationFrame(animate);
    }, [result.score]);

    const shareSummary = () => {
      const adj = [];
      if (ztaEnabled) adj.push("ZTA");
      if (decayEnabled && cveAge > 0) adj.push("decay " + cveAge + "yr");
      const text = `${cveId || "CVE"} | DTVSS ${result.score.toFixed(2)} ${tier.level} | B=${B_adj.toFixed(2)} L=${L_eff.toFixed(4)} H=${H.toFixed(1)} ${tgaClass}${adj.length ? " | " + adj.join(", ") : ""}${result.kevOverride ? " | KEV" : ""}  | SLA: ${tier.sla} | dtvss.io`;
      if (navigator.clipboard) navigator.clipboard.writeText(text);
      setCopied(true); setTimeout(() => setCopied(false), 2000);
    };

    const loadExample = (b, l, cls, cve) => {
      setB(b); setL(l); setTgaClass(cls); setCveId(cve);
      setKev(false); setZtaEnabled(false); setDecayEnabled(false);
      lookupCVE(cve);
    };

    const mono = "'IBM Plex Mono',monospace";
    const body = "'IBM Plex Sans',system-ui,sans-serif";
    const disp = "'IBM Plex Mono',system-ui,sans-serif";
    const scorePct = (animScore / 10) * 100;

    return e('div', { style: { background: "#080a0f", color: "#b8bcc8", minHeight: "100vh", fontFamily: body, fontSize: "13px" } },

      // Header
      e('div', { style: { padding: "20px 24px 16px", borderBottom: "1px solid #1e2433", display: "flex", alignItems: "baseline", gap: "12px", flexWrap: "wrap" } },
        e('a', { href: "/", style: { fontFamily: disp, fontSize: "18px", fontWeight: 700, color: "#e2e6f0", letterSpacing: "-0.02em", textDecoration: "none" } }, "DTVSS"),
        e('span', { style: { fontFamily: mono, fontSize: "11px", color: "#6b7280" } }, "v6.0 - Interactive Calculator"),
        e('a', { href: "/", style: { marginLeft: "auto", fontFamily: mono, fontSize: "11px", color: "#5b93f5", textDecoration: "none" } }, "← Back to Search")
      ),

      e('div', { style: { padding: "20px 24px", display: "flex", flexDirection: "column", gap: "20px", maxWidth: "720px", margin: "0 auto", width: "100%" } },

        // Score Display
        e('div', {
          style: {
            background: `linear-gradient(135deg,${tier.bg},#141820)`,
            border: `1px solid ${tier.border}`,
            borderRadius: "12px", padding: "28px 24px",
            display: "flex", flexDirection: "column", alignItems: "center", gap: "8px",
            position: "relative", overflow: "hidden"
          }
        },
          e('div', { style: { position: "absolute", top: "-40px", left: "50%", transform: "translateX(-50%)", width: "200px", height: "120px", background: `radial-gradient(ellipse,${tier.color}15,transparent 70%)`, pointerEvents: "none" } }),
          e('div', { style: { fontFamily: disp, fontSize: "56px", fontWeight: 900, color: tier.color, lineHeight: 1, letterSpacing: "-0.03em" } }, animScore.toFixed(2)),
          e('div', { style: { width: "100%", maxWidth: "320px", height: "6px", background: "#181d2a", borderRadius: "3px", overflow: "hidden" } },
            e('div', { style: { width: `${scorePct}%`, height: "100%", background: `linear-gradient(90deg,${tier.color}88,${tier.color})`, borderRadius: "3px", transition: "width 0.4s cubic-bezier(0.16,1,0.3,1)" } })
          ),
          e('div', { style: { display: "flex", gap: "8px", alignItems: "center" } },
            e('span', { style: { fontFamily: mono, fontSize: "11px", fontWeight: 600, color: tier.color, background: `${tier.color}18`, padding: "3px 10px", borderRadius: "4px", border: `1px solid ${tier.color}30` } },
              (result.kevOverride ? "KEV OVERRIDE - " : "") + tier.level.toUpperCase()
            ),
            e('span', { style: { fontFamily: mono, fontSize: "11px", color: "#6b7280", background: "#0e1118", padding: "3px 8px", borderRadius: "4px", border: "1px solid #1e2433" } }, "SLA: " + tier.sla)
          ),
          e('div', { style: { fontFamily: body, fontSize: "11px", color: "#6b7280", textAlign: "center", maxWidth: "420px", lineHeight: 1.5 } }, tier.guidance),
          e('button', { onClick: () => setShowRationale(!showRationale), style: { fontFamily: mono, fontSize: "11px", color: "#6b7280", background: "none", border: "none", cursor: "pointer", textDecoration: "underline", opacity: .6 } },
            showRationale ? "Hide rationale" : "Show rationale"
          ),
          showRationale && e('div', { style: { fontFamily: mono, fontSize: "11px", color: "#6b7280", textAlign: "center", maxWidth: "400px", opacity: .7 } }, tier.rationale),
          e('button', {
            onClick: shareSummary,
            style: { fontFamily: mono, fontSize: "11px", fontWeight: 600, padding: "4px 12px", borderRadius: "4px", cursor: "pointer", border: "1px solid #1e2433", background: copied ? "rgba(76,175,122,0.15)" : "#0e1118", color: copied ? "#48b878" : "#6b7280", marginTop: "4px" }
          }, copied ? "Copied" : "Copy score summary"),
          !result.kevOverride && e('div', { style: { fontFamily: mono, fontSize: "11px", color: "#6b7280", textAlign: "center" } },
            `Static baseline (L=0): ${staticBaseline.toFixed(2)} · Temporal lift: +${(result.score - staticBaseline).toFixed(2)}`,
            baseResult && !baseResult.kevOverride && e('span', null, ` · Unmodified: ${baseResult.score.toFixed(2)}`)
          )
        ),

        // Input Controls
        e('div', { style: { background: "#141820", border: "1px solid #1e2433", borderRadius: "12px", padding: "20px 16px" } },

          // CVE lookup
          e('div', { style: { marginBottom: "16px" } },
            e('div', { style: { fontSize: "11px", fontWeight: 600, letterSpacing: "0.1em", color: "#6b7280", fontFamily: mono, marginBottom: "6px" } },
              "CVE ID - enter and click Lookup to auto-populate B, L(t), H, and KEV"
            ),
            e('div', { style: { display: "flex", gap: "8px", alignItems: "center", flexWrap: "wrap" } },
              e('input', {
                type: "text", value: cveId,
                onChange: ev => setCveId(ev.target.value.toUpperCase()),
                onKeyDown: ev => { if (ev.key === "Enter") lookupCVE(); },
                placeholder: "CVE-2017-12718",
                style: { width: "100%", maxWidth: "220px", background: "#080a0f", border: "1px solid #1e2433", borderRadius: "6px", padding: "8px 12px", color: "#e2e6f0", fontFamily: mono, fontSize: "12px", outline: "none" }
              }),
              e('button', {
                onClick: () => lookupCVE(),
                disabled: lookupLoading || !cveId.match(/^CVE-\d{4}-\d+$/i) || !turnstileReady,
                style: { background: "#5b93f5", border: "none", borderRadius: "6px", padding: "8px 16px", color: "#fff", fontFamily: mono, fontSize: "11px", fontWeight: 600, cursor: "pointer", opacity: (lookupLoading || !cveId.match(/^CVE-\d{4}-\d+$/i) || !turnstileReady) ? .4 : 1, whiteSpace: "nowrap" }
              }, lookupLoading ? "Loading..." : (turnstileReady ? "Lookup" : "Verifying you're human...")),
              cveYear && e('span', { style: { fontFamily: mono, fontSize: "11px", color: "#6b7280" } }, `Year: ${cveYear} · Age: ${Math.round(cveAge)}yr`)
            ),
            // Turnstile widget mount point (visible flexible widget). Cloudflare
            // renders a verification widget here on page load; the bootstrap
            // script wires its callbacks to the dtvss-turnstile-ready /
            // -unready events that this component listens to.
            e('div', { id: 'dtvss-turnstile', style: { marginTop: '10px', minHeight: '65px' } }),
            lookupMsg && e('div', { style: { fontFamily: mono, fontSize: "11px", color: lookupMsg.startsWith("Loaded") ? "#48b878" : "#e05252", marginTop: "6px" } }, lookupMsg)
          ),

          // Sliders: B and L
          e('div', { style: { display: "flex", justifyContent: "center", gap: "24px", flexWrap: "wrap" } },
            ...[
              { val: B, set: setB, min: 0, max: 10,  step: 0.01,   label: "B",    sub: "CVSS Exploitability", color: "#5b93f5", dec: 2 },
              { val: L, set: setL, min: 0, max: 1,   step: 0.0001, label: "L(t)", sub: "EPSS Likelihood",     color: "#a070e8", dec: 4 },
            ].map((k, i) => e('div', { key: i, style: { display: "flex", flexDirection: "column", alignItems: "center", gap: "6px", minWidth: "130px" } },
              e('div', { style: { fontSize: "11px", fontWeight: 600, letterSpacing: "0.1em", color: "#6b7280", fontFamily: mono } }, k.label),
              e('div', { style: { fontFamily: mono, fontSize: "22px", fontWeight: 700, color: k.color } }, k.val.toFixed(k.dec)),
              e('input', { type: "range", min: k.min, max: k.max, step: k.step, value: k.val, onChange: ev => k.set(parseFloat(ev.target.value)), style: { width: "120px", accentColor: k.color, height: "3px" } }),
              e('input', { type: "number", value: k.val, min: k.min, max: k.max, step: k.step, onChange: ev => { const v = parseFloat(ev.target.value); if (!isNaN(v)) k.set(Math.max(k.min, Math.min(k.max, v))); }, style: { width: "80px", background: "#080a0f", border: "1px solid #1e2433", borderRadius: "4px", padding: "4px 6px", color: k.color, fontFamily: mono, fontSize: "11px", textAlign: "center", outline: "none" } }),
              e('div', { style: { fontSize: "11px", color: "#6b7280", fontFamily: mono } }, k.sub)
            )),

            // H selector
            e('div', { style: { display: "flex", flexDirection: "column", alignItems: "center", gap: "6px", minWidth: "130px" } },
              e('div', { style: { fontSize: "11px", fontWeight: 600, letterSpacing: "0.1em", color: "#6b7280", fontFamily: mono } }, "H"),
              e('div', { style: { fontFamily: mono, fontSize: "22px", fontWeight: 700, color: TGA_CLASSES[tgaClass].color } }, H.toFixed(1)),
              e('div', { style: { display: "flex", gap: "4px", marginTop: "4px" } },
                ...Object.entries(TGA_CLASSES).map(([cls, info]) => e('button', {
                  key: cls, onClick: () => setTgaClass(cls),
                  style: { fontFamily: mono, fontSize: "11px", fontWeight: 600, padding: "4px 8px", borderRadius: "3px", cursor: "pointer", border: `1px solid ${tgaClass === cls ? info.color : "#1e2433"}`, background: tgaClass === cls ? `${info.color}20` : "transparent", color: tgaClass === cls ? info.color : "#6b7280" }
                }, cls))
              ),
              e('div', { style: { fontSize: "11px", color: "#6b7280", fontFamily: mono } }, "Patient Harm")
            )
          ),

          // Jurisdiction table
          e('div', { style: { marginTop: "14px", padding: "12px", background: `${TGA_CLASSES[tgaClass].color}08`, border: `1px solid ${TGA_CLASSES[tgaClass].color}15`, borderRadius: "6px" } },
            e('div', { style: { fontFamily: mono, fontSize: "11px", color: TGA_CLASSES[tgaClass].color, fontWeight: 600 } }, `${TGA_CLASSES[tgaClass].label} · H = ${H.toFixed(1)} - ${TGA_CLASSES[tgaClass].desc}`),

// -----------------------------------------------------------------------------
// Turnstile widget bootstrap
// -----------------------------------------------------------------------------
// Renders an invisible Turnstile widget once the script has loaded and the
// sitekey has been fetched from the server. The widget handle is stashed on
// window.__dtvssTurnstileWidget so the React component (above) can call
// turnstile.getResponse(handle) per API request to retrieve the token.
//
// Why fetch the sitekey rather than hard-code it: it lets us deploy the same
// HTML file across environments (staging/prod) without rebuilds, and lets us
// rotate the sitekey via env-var redeploy without touching templates. The
// sitekey is public by design, so /api/turnstile-config is unauthenticated.
//
// If TURNSTILE_SITEKEY isn't configured server-side, the endpoint returns
// {sitekey: ""} and we skip rendering - the API will then accept requests
// without a token (matching the server-side fail-open in dev).
(function bootstrapTurnstile() {
  let attempts = 0;
  // Tracks first-ever successful verification. Once true, the widget
  // is hidden and stays hidden across silent token resets ('used'
  // reason). It only fades back in if verification genuinely fails
  // ('expired' or 'error') so the user can recover.
  let everVerified = false;

  function setWidgetVisibility(visible) {
    var c = document.getElementById('dtvss-turnstile');
    if (!c) return;
    if (visible) {
      c.style.display = '';
      c.style.opacity = '';
      c.style.height = '';
      c.style.overflow = '';
      c.style.pointerEvents = '';
    } else {
      c.style.transition = 'opacity 300ms ease-out';
      c.style.opacity = '0';
      c.style.pointerEvents = 'none';
      setTimeout(function () {
        c.style.height = '0';
        c.style.overflow = 'hidden';
        c.style.transition = '';
      }, 300);
    }
  }

  function fireReady(token) {
    window.__dtvssTurnstileToken = token || "";
    window.dispatchEvent(new CustomEvent('dtvss-turnstile-ready', { detail: { token: token } }));
    // First successful verification: fade out the widget.
    if (token && !everVerified) {
      everVerified = true;
      setWidgetVisibility(false);
    }
  }
  function fireUnready(reason) {
    window.__dtvssTurnstileToken = "";
    window.dispatchEvent(new CustomEvent('dtvss-turnstile-unready', {
      detail: { reason: reason || 'unknown' }
    }));
    // 'used': silent post-search reset. Keep widget hidden if we've
    // ever verified.
    // 'expired' / 'error': verification genuinely needs the user's
    // attention - bring the widget back so they can see it.
    if (reason === 'expired' || reason === 'error') {
      setWidgetVisibility(true);
    }
  }

  // Listen for 'used' dispatches from the lookupCVE flow. The fetch
  // path dispatches dtvss-turnstile-unready directly (without going
  // through fireUnready) when consuming a token, so we mirror the
  // visibility logic here for that path too. No-op if already hidden.
  window.addEventListener('dtvss-turnstile-unready', function (ev) {
    var reason = (ev.detail && ev.detail.reason) || '';
    if (reason === 'expired' || reason === 'error') {
      setWidgetVisibility(true);
    }
    // 'used' falls through: container is already hidden (everVerified
    // was true to get to this point), so no action needed.
  });

  function tryRender() {
    if (window.__dtvssTurnstileWidget != null) return;
    if (!window.turnstile || typeof window.turnstile.render !== "function") {
      // Script hasn't finished loading yet. Retry up to ~5 seconds; if
      // it never loads (CSP block, offline, ad-blocker), give up - the
      // Lookup button stays disabled with "Verifying..." (conservative).
      if (++attempts > 50) return;
      setTimeout(tryRender, 100);
      return;
    }
    fetch("/api/turnstile-config")
      .then(function (r) { return r.json(); })
      .then(function (cfg) {
        if (!cfg || !cfg.sitekey) {
          // Server is in fail-open dev mode (no TURNSTILE_SECRET). Mark
          // ready with empty token; API will accept without one.
          fireReady("");
          return;
        }
        var container = document.getElementById("dtvss-turnstile");
        if (!container) return;
        window.__dtvssTurnstileWidget = window.turnstile.render(container, {
          sitekey: cfg.sitekey,
          // 'flexible' adapts to the container width.
          size: "flexible",
          // Token success: cache and notify React component (or any
          // listener) that the widget is ready.
          callback: function (token) { fireReady(token); },
          // Token expired (~5 min): clear cache, mark unready. Turnstile
          // auto-resets and we'll get a fresh callback when ready again.
          'expired-callback': function () { fireUnready('expired'); },
          // Verification failed: mark unready; user sees error state.
          'error-callback': function (errorCode) {
            console.warn('Turnstile error:', errorCode);
            fireUnready('error');
          }
        });
      })
      .catch(function () {
        // /api/turnstile-config failed; treat as fail-open.
        fireReady("");
      });
  }
  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", tryRender);
  } else {
    tryRender();
  }
})();
