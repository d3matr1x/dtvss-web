[build]
# Railpack is Railway's current builder. Nixpacks (the previous default) was
# placed in maintenance mode and is no longer the default for new services —
# this config explicitly opts into Railpack so behaviour is the same whether
# this service is brand new or migrated from a Nixpacks deploy.
#
# The custom install command lives in railpack.json (config-as-code), not
# here. Railpack does not honour the [build.nixpacksConfig.*] block that the
# Nixpacks builder used; the equivalent is railpack.json's `steps.install`
# section. See railpack.json in the repo root for the hashed-install override.
#
# Migrating an existing Railway service from Nixpacks to Railpack:
#   Service Settings → Build → Builder → Railpack → Save
# The next deploy will use this railway.toml + railpack.json instead of the
# old [build.nixpacksConfig.*] block.
builder = "RAILPACK"

[deploy]
# gunicorn hardening (from INFO-02 in pentest):
#   --workers 4            — serve concurrency, but cap it so Redis-based
#                             rate limiting works correctly across workers
#   --timeout 30           — kill workers stuck on bad upstream responses
#   --limit-request-line   — reject oversized URLs (query-string DoS)
#   --limit-request-fields — reject header-bomb DoS
#   --access-logfile -     — send access logs to stdout (Railway captures)
#   --error-logfile -      — send error logs to stdout (Railway captures)
startCommand = "gunicorn app:app --bind 0.0.0.0:$PORT --workers 4 --timeout 30 --limit-request-line 2048 --limit-request-fields 50 --access-logfile - --error-logfile -"

# Use the dedicated /health endpoint added by app_HARDENED.py
# Reason: decouples health checks from business logic and keeps health
# checks outside the expensive rate-limit bucket (so Railway's checks
# don't generate 429s during noisy periods).
healthcheckPath = "/health"
healthcheckTimeout = 10
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# -----------------------------------------------------------------------------
# Required variables (set in Railway dashboard → Variables)
# -----------------------------------------------------------------------------
#
#   NVD_API_KEY          — your key from https://nvd.nist.gov/developers/request-an-api-key
#                           Without this, NVD throttles you to 5 req/30s.
#
#   DTVSS_DATA_DIR       — /data   (must match the volume mount point below)
#
#   DTVSS_CORS_ORIGINS   — comma-separated list of production origins
#                           e.g. https://dtvss.yourdomain.com
#                           If unset, defaults to an allowlist that probably
#                           won't match your real domain. Set this.
#
#   REDIS_URL            — ${{Redis.REDIS_URL}}
#                           Add a Redis service to your project first; then
#                           reference its REDIS_URL variable. Without this,
#                           rate limiting uses in-process memory — each of
#                           the 4 gunicorn workers has its own counter,
#                           effectively 4× your advertised limit, and all
#                           counters reset on restart.
#
# -----------------------------------------------------------------------------
# Volume mount (set in Railway dashboard → Volumes)
# -----------------------------------------------------------------------------
#
#   New Volume → mount at /data
#
#   The MDM index must persist across container restarts so the hourly RSS
#   top-up isn't lost between deploys. On first boot the index_loader
#   copies the repo-shipped seed index into /data/mdm_index.json, then
#   updates it in place. Without the volume, every deploy wipes accumulated
#   ICSMA enrichment data.
#
#   app_HARDENED.py also fails loud at startup if DTVSS_DATA_DIR isn't set
#   in a production environment, because a "works fine, silently loses
#   data" configuration is worse than crashing immediately.
#
# -----------------------------------------------------------------------------
# Optional — add a Redis service for multi-worker rate limiting
# -----------------------------------------------------------------------------
#
#   Dashboard → New Service → Database → Redis
#   Then in this app's service → Variables → Add:
#     REDIS_URL = ${{Redis.REDIS_URL}}
#
#   Python's `redis` client supports Railway's IPv6 private networking
#   natively from 5.0+. requirements.txt pins redis>=5.0.0 accordingly.
#
# -----------------------------------------------------------------------------
